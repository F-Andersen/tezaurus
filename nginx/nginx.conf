events {
    worker_connections 1024;
}

http {
    upstream web {
        server web:3000;
    }
    upstream admin {
        server admin:3001;
    }
    upstream api {
        server api:4000;
    }

    server {
        listen 80;
        server_name tezaurustour.com www.tezaurustour.com localhost;

        # Redirect HTTP → HTTPS in production (uncomment after obtaining SSL certs):
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin {
            proxy_pass http://admin;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
        }
    }

    # HTTPS server — uncomment after obtaining Let's Encrypt certs:
    # server {
    #     listen 443 ssl http2;
    #     server_name tezaurustour.com www.tezaurustour.com;
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options SAMEORIGIN;
    #     add_header X-Content-Type-Options nosniff;
    #     location / {
    #         proxy_pass http://web; proxy_http_version 1.1;
    #         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    #     location /admin {
